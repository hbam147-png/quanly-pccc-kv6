<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý PCCC - Đội KV6</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; }
        .header { background: linear-gradient(135deg, #dc3545, #0d6efd); color: white; padding: 1.5rem; text-align: center; border-radius: 0 0 20px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #212529; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 2rem; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; }
        #mainApp { display: none; padding-bottom: 50px; }
        .stat-card { background: white; border-radius: 15px; padding: 1rem; text-align: center; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: 0.3s; cursor: pointer; }
        .stat-card.active { border: 2px solid #dc3545; background: #fff5f5; }
        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="loginScreen">
        <div class="login-box">
            <i class="fas fa-lock-open fa-3x text-danger mb-3"></i>
            <h4 class="fw-bold">Hệ thống KV6</h4>
            <input type="password" id="appPassword" class="form-control form-control-lg my-3 text-center" placeholder="Mật khẩu (114)">
            <button class="btn btn-danger btn-lg w-100" onclick="checkLogin()">ĐĂNG NHẬP</button>
        </div>
    </div>

    <div id="loadingOverlay"><div class="spinner-border text-danger mb-2"></div><b id="loadingText">Đang tải...</b></div>

    <div id="mainApp">
        <div class="header">
            <h2 class="mb-0">ĐỘI KV6 - QUẢNG NINH</h2>
            <p class="small opacity-75">Quản lý Phương tiện PCCC & CNCH</p>
            <button class="btn btn-sm btn-light py-0" onclick="logout()">Thoát</button>
        </div>

        <div class="container mt-3">
            <div class="row g-2 mb-3">
                <div class="col-3"><div class="stat-card active" onclick="filterData('all', this)"><h6>Tổng</h6><h3 id="count_all" class="text-primary">0</h3></div></div>
                <div class="col-3"><div class="stat-card" onclick="filterData('Sẵn sàng', this)"><h6>Tốt</h6><h3 id="count_ok" class="text-success">0</h3></div></div>
                <div class="col-3"><div class="stat-card" onclick="filterData('Cần bảo dưỡng', this)"><h6>Sửa</h6><h3 id="count_fix" class="text-warning">0</h3></div></div>
                <div class="col-3"><div class="stat-card" onclick="filterData('Hỏng', this)"><h6>Hỏng</h6><h3 id="count_bad" class="text-danger">0</h3></div></div>
            </div>

            <button class="btn btn-primary w-100 mb-3 fw-bold" onclick="fetchData()"><i class="fas fa-sync"></i> LÀM MỚI DỮ LIỆU</button>

            <div class="table-responsive bg-white rounded shadow-sm">
                <table class="table table-sm align-middle mb-0">
                    <thead class="table-dark"><tr><th>Loại</th><th>Mã</th><th>Tình trạng</th></tr></thead>
                    <tbody id="dataTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwKxsoaEXj1OPOXQ5P7jEv_C0R-OG0wEUTVsc3r9IndLuT1Htg2IFv0al_EBqzxgaVc/exec";
        const PASS = "114";
        let fullData = [];

        window.onload = () => { if(localStorage.getItem('kv6_auth') === 'true') loginOk(); };

        function checkLogin() {
            if(document.getElementById('appPassword').value === PASS) {
                localStorage.setItem('kv6_auth', 'true');
                loginOk();
            } else { alert("Sai mật khẩu!"); }
        }

        function loginOk() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            fetchData();
        }

        function logout() { localStorage.clear(); location.reload(); }

        function showLoad(s, t="Đang tải...") { 
            document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; 
            document.getElementById('loadingText').innerText = t;
        }

        async function fetchData() {
            showLoad(true);
            try {
                const res = await fetch(API_URL + "?action=getData");
                const json = await res.json();
                fullData = json.phuongTien || [];
                render(fullData);
            } catch (e) { alert("Lỗi kết nối Sheets!"); }
            showLoad(false);
        }

        function render(data) {
            // Cập nhật số lượng
            document.getElementById('count_all').innerText = fullData.length;
            document.getElementById('count_ok').innerText = fullData.filter(i => (i.TinhTrang||'').includes('Sẵn sàng')).length;
            document.getElementById('count_fix').innerText = fullData.filter(i => (i.TinhTrang||'').includes('bảo dưỡng')).length;
            document.getElementById('count_bad').innerText = fullData.filter(i => (i.TinhTrang||'').includes('Hỏng')).length;

            const tbody = document.getElementById('dataTable');
            tbody.innerHTML = data.map(i => `
                <tr>
                    <td><b>${i.Loai || ''}</b><br><small class="text-muted">${i.NguoiPhuTrach || ''}</small></td>
                    <td><span class="badge bg-secondary">${i.KyHieu || ''}</span></td>
                    <td class="${(i.TinhTrang||'').includes('Hỏng')?'text-danger':(i.TinhTrang||'').includes('bảo dưỡng')?'text-warning':'text-success'} fw-bold">${i.TinhTrang || ''}</td>
                </tr>
            `).join('');
        }

        function filterData(status, el) {
            document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            if(status === 'all') render(fullData);
            else render(fullData.filter(i => (i.TinhTrang||'').includes(status)));
        }
    </script>
</body>
</html>
